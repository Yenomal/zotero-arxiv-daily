name: SSH PDF Sync Test

on:
  workflow_dispatch:

jobs:
  ssh-pdf-sync-test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        env:
          PDF_SSH_HOST: ${{ secrets.PDF_SSH_HOST }}
          PDF_SSH_PORT: ${{ secrets.PDF_SSH_PORT }}
          PDF_SSH_PRIVATE_KEY: ${{ secrets.PDF_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "$PDF_SSH_PRIVATE_KEY" > ~/.ssh/pdf_sync_key
          chmod 600 ~/.ssh/pdf_sync_key
          echo "PDF_SSH_HOST set: $([ -n "${PDF_SSH_HOST}" ] && echo yes || echo no)"
          echo "PDF_SSH_PORT=${PDF_SSH_PORT}"
          echo "Runner public IP:"
          curl -fsSL https://api.ipify.org || true
          echo
          echo "DNS lookup:"
          getent hosts "${PDF_SSH_HOST}" || true
          echo "TCP connectivity:"
          nc -vz -w 20 "${PDF_SSH_HOST}" "${PDF_SSH_PORT}"
          echo "Scanning SSH host key:"
          ssh-keyscan -T 20 -p "${PDF_SSH_PORT}" "${PDF_SSH_HOST}" | tee -a ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH login
        env:
          PDF_SSH_HOST: ${{ secrets.PDF_SSH_HOST }}
          PDF_SSH_PORT: ${{ secrets.PDF_SSH_PORT }}
          PDF_SSH_USER: ${{ secrets.PDF_SSH_USER }}
        run: |
          echo "PDF_SSH_USER=${PDF_SSH_USER}"
          ssh -vvv -o BatchMode=yes -o ConnectTimeout=20 -p "${PDF_SSH_PORT}" -i ~/.ssh/pdf_sync_key "${PDF_SSH_USER}@${PDF_SSH_HOST}" "whoami && pwd"

      - name: Test remote PDF directory write
        env:
          PDF_SSH_HOST: ${{ secrets.PDF_SSH_HOST }}
          PDF_SSH_PORT: ${{ secrets.PDF_SSH_PORT }}
          PDF_SSH_USER: ${{ secrets.PDF_SSH_USER }}
          PDF_SSH_REMOTE_DIR: ${{ vars.PDF_SSH_REMOTE_DIR }}
        run: |
          test_file="github_actions_ssh_test_$(date -u +'%Y%m%d_%H%M%S').txt"
          mkdir -p "$RUNNER_TEMP/pdf-sync-test"
          printf "github actions ssh sync test\n" > "$RUNNER_TEMP/pdf-sync-test/$test_file"
          ssh -vvv -o BatchMode=yes -o ConnectTimeout=20 -p "${PDF_SSH_PORT}" -i ~/.ssh/pdf_sync_key "${PDF_SSH_USER}@${PDF_SSH_HOST}" "mkdir -p '${PDF_SSH_REMOTE_DIR}'"
          scp -v -P "${PDF_SSH_PORT}" -i ~/.ssh/pdf_sync_key "$RUNNER_TEMP/pdf-sync-test/$test_file" "${PDF_SSH_USER}@${PDF_SSH_HOST}:${PDF_SSH_REMOTE_DIR}/"
          ssh -vvv -o BatchMode=yes -o ConnectTimeout=20 -p "${PDF_SSH_PORT}" -i ~/.ssh/pdf_sync_key "${PDF_SSH_USER}@${PDF_SSH_HOST}" "test -f '${PDF_SSH_REMOTE_DIR}/${test_file}' && ls -l '${PDF_SSH_REMOTE_DIR}/${test_file}'"
