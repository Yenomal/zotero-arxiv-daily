name: Send emails daily
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.REPOSITORY }}
          ref: ${{ vars.REF }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Run script
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          PDF_LOCAL_DIR: ${{ runner.temp }}/zotero-pdf
          CUSTOM_CONFIG: ${{ vars.CUSTOM_CONFIG }}
        run: |
          printf "%b\n" "$CUSTOM_CONFIG" > config/custom.yaml
          echo "Use custom config: "
          cat config/custom.yaml
          uv run src/zotero_arxiv_daily/main.py

      - name: Setup SSH for PDF sync
        if: ${{ vars.PDF_SSH_ENABLED == 'true' }}
        env:
          PDF_SSH_HOST: ${{ secrets.PDF_SSH_HOST }}
          PDF_SSH_PORT: ${{ secrets.PDF_SSH_PORT }}
          PDF_SSH_USER: ${{ secrets.PDF_SSH_USER }}
          PDF_SSH_PRIVATE_KEY: ${{ secrets.PDF_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "$PDF_SSH_PRIVATE_KEY" > ~/.ssh/pdf_sync_key
          chmod 600 ~/.ssh/pdf_sync_key
          echo "PDF_SSH_HOST set: $([ -n "${PDF_SSH_HOST}" ] && echo yes || echo no)"
          echo "PDF_SSH_PORT=${PDF_SSH_PORT}"
          echo "PDF_SSH_USER=${PDF_SSH_USER}"
          echo "Runner public IP:"
          curl -fsSL https://api.ipify.org || true
          echo
          echo "DNS lookup:"
          getent hosts "${PDF_SSH_HOST}" || true
          echo "TCP connectivity:"
          nc -vz -w 20 "${PDF_SSH_HOST}" "${PDF_SSH_PORT}"
          echo "Scanning SSH host key:"
          ssh-keyscan -T 20 -p "${PDF_SSH_PORT}" "${PDF_SSH_HOST}" | tee -a ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync PDFs to remote host
        if: ${{ vars.PDF_SSH_ENABLED == 'true' }}
        env:
          PDF_LOCAL_DIR: ${{ runner.temp }}/zotero-pdf
          PDF_SSH_HOST: ${{ secrets.PDF_SSH_HOST }}
          PDF_SSH_PORT: ${{ secrets.PDF_SSH_PORT }}
          PDF_SSH_USER: ${{ secrets.PDF_SSH_USER }}
          PDF_SSH_REMOTE_DIR: ${{ vars.PDF_SSH_REMOTE_DIR }}
        run: |
          ssh -vvv -o BatchMode=yes -o ConnectTimeout=20 -p "${PDF_SSH_PORT}" -i ~/.ssh/pdf_sync_key "${PDF_SSH_USER}@${PDF_SSH_HOST}" "mkdir -p '${PDF_SSH_REMOTE_DIR}'"
          shopt -s nullglob
          files=("${PDF_LOCAL_DIR}"/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No PDF or metrics files to sync."
            exit 0
          fi
          scp -v -P "${PDF_SSH_PORT}" -i ~/.ssh/pdf_sync_key "${files[@]}" "${PDF_SSH_USER}@${PDF_SSH_HOST}:${PDF_SSH_REMOTE_DIR}/"
