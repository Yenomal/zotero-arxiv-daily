zotero:
  user_id: ??? # User ID of your Zotero account.
  api_key: ??? # An Zotero API key with read/write access.
  include_path: null # A list of glob patterns marking the Zotero collections that should be included. Example: ["2026/survey/**","2026/reading-group/**"]
  ignore_path: null # A list of glob patterns marking the Zotero collections that should be excluded. Example: ["2026/ignore/**","archive/**"]

source:
  arxiv:
    category: ["cs.AI","cs.CV","cs.LG","cs.CL","cs.RO"] # The categories of target arxiv papers. Find the abbr of your research area from [here](https://arxiv.org/category_taxonomy). Example: ["cs.AI","cs.CV","cs.LG","cs.CL"]
    include_cross_list: true # Whether to include arXiv cross-list papers in subscribed categories. Example: true
    full_text:
      enabled: true # Whether to fetch full text for selected papers. Example: true
      tar_timeout_sec: 20 # Tar extraction timeout. Example: 20
      html_timeout_sec: 10 # HTML extraction timeout. Example: 10
      pdf_timeout_sec: 20 # PDF extraction timeout. Example: 20
      connect_timeout_sec: 10 # Download connect timeout. Example: 10
      read_timeout_sec: 30 # Download read timeout. Example: 30
  biorxiv:
    category: null # The categories of target biorxiv papers. Find categories from [here](https://www.biorxiv.org/). Example: ["biochemistry","animal behavior and cognition"]
  medrxiv:
    category: null # The categories of target medrxiv papers. Find categories from [here](https://www.medrxiv.org/) Example: ["psychiatry and clinical psychology", "neurology"]

email:
  sender: ??? # The email account of the SMTP server that sends you email. Example: abc@qq.com
  receiver: ??? # The email account that receives the paper list. Example: abc@outlook.com
  smtp_server: ??? # The SMTP server that sends the email. Ask your email provider (Gmail, QQ, Outlook, ...) for its SMTP server. Example: smtp.qq.com
  smtp_port: ??? # The port of SMTP server. Example: 465
  sender_password: ??? # The password of the sender account. Note that it's not necessarily the password for logging in the e-mail client, but the authentication code for SMTP service. Ask your email provider for this. Example: abcdefghijklmn

output:
  mode: zotero # The output mode. Example: email, zotero, both
  zotero:
    collection_path_parts: ??? # The Zotero collection path parts to receive recommended papers. Example: ["泛读"]
    collection_path: ??? # The Zotero collection path to receive recommended papers. Example: 泛读
    write_note: true # Whether to write recommendation notes. Example: true
    note_template_path: config/note_template.html # The HTML template path for recommendation notes. Example: config/note_template.html
    note_template: "<p>推荐来源：zotero-arxiv-daily</p>" # Fallback HTML template when the template file is unavailable.
  pdf:
    enabled: true # Whether to save PDFs locally. Example: true
    dir: ??? # The local directory for downloaded PDFs. Example: /home/rui/zotero/pdf

scorer:
  enabled: true # Whether to enable the stage-3 scoring skill. Example: true
  final_top_k: 10 # The number of papers kept after second ranking. Example: 10
  model: gpt-5.4 # The LLM model used for scoring. Example: gpt-5.4
  temperature: 0.2 # The temperature used for scoring. Example: 0.2
  prompt:
    system_prompt_path: config/scorer_system_prompt.txt # The system prompt path. Example: config/scorer_system_prompt.txt
    user_prompt_path: config/scorer_user_prompt.txt # The user prompt path. Example: config/scorer_user_prompt.txt
    schema_path: config/scorer_schema.json # The scoring schema path. Example: config/scorer_schema.json
  note:
    enabled: true # Whether to generate a separate reading note. Example: true
    prompt_path: config/reading_note_prompt.txt # The reading note prompt path. Example: config/reading_note_prompt.txt
  text:
    cleanup:
      reference_headings: ["References", "REFERENCES", "Bibliography", "BIBLIOGRAPHY"] # The headings used to stop the text. Example: ["References", "Bibliography"]
  metrics:
    write_txt: true # Whether to write total token usage to a txt file. Example: true
    output_dir: ??? # The metrics output directory. Example: /home/rui/zotero/pdf

llm:
  api:
    key: ??? # API Key of your LLM API. Example: sk-xxx
    base_url: ??? # API URL of your LLM API. Example: https://api.openai.com/v1
  generation_kwargs:
  # Arguments for the LLM API. See [here](https://platform.openai.com/docs/api-reference/chat/create) for more details.
    max_tokens: 16384
    model: gpt-5.4
  language: chinese # Preferred language for the TL;DR. Example: English

reranker:
  local:
    model: jinaai/jina-embeddings-v5-text-nano-retrieval # The Hugging Face model name of the local embedding model. Example: jinaai/jina-embeddings-v5-text-nano
    encode_kwargs:
    # The kwargs for the encode method of the local embedding model. Details see [here](https://www.sbert.net/docs/package_reference/SentenceTransformer.html#sentence_transformers.SentenceTransformer.encode)
      task: retrieval
      prompt_name: document
  api:
    key: ??? # API Key of your embedding model API. Example: sk-xxx
    base_url: ??? # API URL of your embedding model API. Example: https://api.openai.com/v1
    model: text-embedding-3-large # The model name of the embedding model. Example: text-embedding-3-large
    batch_size: 64 # The batch size for embedding API requests. Adjust to match your provider's limit. Example: 64

executor:
  debug: false # Whether to use debug mode. Example: true
  send_empty: false # Whether to send an empty email even if no new papers today. Example: true
  max_paper_num: 50  # The maximum number of the papers presented in the email. Example: 100
  source: ['arxiv'] # The sources of papers to retrieve. Example: ['arxiv','biorxiv','medrxiv']
  reranker: local # The reranker to use. Example: 'local' or 'api'
